{% extends 'layout.html' %} 
{% block body %}

<div class="container py-2 mx-auto my-50 h-10 text-center" style="margin: 9rem;">
  <div class="row">
    <div class="col-sm py-2 py-md-3">
      <div class="card card-body" style="justify-content: center; background-color:blanchedalmond">

        <h1 class="text-center" style="color: black; font-size: 20px;">
          <b>Unable to fetch weather data for the location you entered.</b>
        </h1>

        <p style="color: #333; font-size: 15px; margin-top: 10px;">
          Possible reasons:<br>
          • Incorrect city or state name<br>
          • Weather data not available for this region<br>
          • Internet or API issue<br><br>
          Please check your input and try again.
        </p>

        <a href="{{ url_for('crop_recommend') }}">
          <button type="submit" class="btn btn-info text-center" 
          style="color: black; font-weight: bold; margin: 1rem;">
            Try Again
          </button>
        </a>

      </div>
    </div>
  </div>
</div>

{% endblock %}
